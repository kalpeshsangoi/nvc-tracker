<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>NVC Tracker</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script><style>body{font-family:sans-serif;background:#f0f2f5;margin:0;padding:10px}.header{background:#002e5b;color:white;padding:15px;border-radius:10px;text-align:center}.tab-bar{display:flex;gap:5px;margin:10px 0}.tab{flex:1;padding:12px;text-align:center;background:#ddd;border-radius:5px;cursor:pointer;font-weight:bold}.tab.active{background:#007bff;color:white}.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:10px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{text-align:left;padding:10px 5px;border-bottom:1px solid #eee}.btn{background:#007bff;color:white;border:none;padding:12px;border-radius:5px;width:100%;font-weight:bold;cursor:pointer}</style></head><body><div class="header"><h2 id="total">Total: ₹0</h2><p>NVC Tracker | Kalpesh</p></div><div class="tab-bar"><div id="t1" class="tab active" onclick="tab('out')">Outstanding</div><div id="t2" class="tab" onclick="tab('acc')">Accountant</div></div><div id="v1" class="card"><strong>Upload PDFs</strong><input type="file" id="pdf" multiple style="width:100%;margin:10px 0"><button id="sb" class="btn" onclick="sync()">SYNC NOW</button><table><thead><tr><th>Party (A-Z)</th><th>Bill</th><th>Amount</th></tr></thead><tbody id="l1"></tbody></table></div><div id="v2" class="card" style="display:none"><button class="btn" style="background:#28a745" onclick="window.print()">Print Report</button><table><thead><tr><th>Party</th><th>Bill</th><th>Recd</th><th style="border-left:1px solid #ddd">Voucher</th></tr></thead><tbody id="l2"></tbody></table></div><script>const cfg={apiKey:"AIzaSyAo_LtxuK0BiefpQKFi5UIDj-F_snYDRWE",authDomain:"nvc-tracker.firebaseapp.com",projectId:"nvc-tracker",storageBucket:"nvc-tracker.firebasestorage.app",messagingSenderId:"424590592551",appId:"1:424590592551:web:627a5c14b18fccc4f49c02"};firebase.initializeApp(cfg);const db=firebase.database();pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';function tab(n){document.getElementById('v1').style.display=n=='out'?'block':'none';document.getElementById('v2').style.display=n=='acc'?'block':'none';document.getElementById('t1').classList.toggle('active',n=='out');document.getElementById('t2').classList.toggle('active',n=='acc')}async function sync(){const fs=document.getElementById('pdf').files;if(!fs.length)return alert("Select PDF");document.getElementById('sb').innerText="READING...";for(let f of fs){const d=await pdfjsLib.getDocument(await f.arrayBuffer()).promise;for(let i=1;i<=d.numPages;i++){const p=await d.getPage(i);const c=await p.getTextContent();const t=c.items.map(it=>it.str).join(" ");t.split("Party:").forEach(s=>{const b=s.match(/(JS|SS)-([\d-]+)/);const a=s.match(/([\d,]+\.\d{2})\sDr/);if(b&&a){const name=s.substring(0,30).trim();db.ref('outstandings/'+b[0]).set({party:name,amount:parseFloat(a[1].replace(/,/g,''))})}})}}document.getElementById('sb').innerText="SUCCESS!";load()}function load(){db.ref('outstandings').on('value',s=>{const d=s.val();const l=document.getElementById('l1');l.innerHTML="";let t=0;if(d){Object.keys(d).sort((a,b)=>d[a].party.localeCompare(d[b].party)).forEach(k=>{t+=d[k].amount;l.innerHTML+=`<tr><td>${d[k].party}</td><td>${k}</td><td>₹${d[k].amount.toLocaleString()}</td></tr>`})}document.getElementById('total').innerText="Total: ₹"+t.toLocaleString()})}load();</script></body></html>
